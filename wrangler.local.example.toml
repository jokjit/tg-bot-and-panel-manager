# 本地私有部署配置示例
# 复制为 `wrangler.local.toml` 后按你自己的 Cloudflare 实例填写。
# 该文件不会提交到 Git。

[[d1_databases]]
binding = "DB"
database_name = "tg-bot-history"
database_id = "<YOUR_PRIVATE_D1_DATABASE_ID>"

[vars]
PUBLIC_BASE_URL = "https://your-worker.example.com"
ADMIN_PANEL_URL = "https://your-pages-panel.example.com"
