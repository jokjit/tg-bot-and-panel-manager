name = "telegram-private-chatbot"
main = "worker.js"
compatibility_date = "2026-04-16"
workers_dev = true

# 可选：完成基础部署后，再按需绑定自定义域名。
# routes = [
#   { pattern = "tg.example.com/*", zone_name = "example.com" }
# ]

# BOT_KV 用于面板密码、用户资料、话题映射、黑白名单和验证状态。
# 桌面部署工具会自动创建/复用 KV，并把真实 namespace id 写入 wrangler.local.toml。
# 手动部署时请取消下面注释并填入真实 id，或者先运行部署工具完成回填。
# [[kv_namespaces]]
# binding = "BOT_KV"
# id = "<YOUR_KV_NAMESPACE_ID>"

# 可选：用于保存聊天历史。建议通过 `npm run setup:d1` 初始化并自动回填。
# [[d1_databases]]
# binding = "DB"
# database_name = "tg-bot-history"
# database_id = "<YOUR_D1_DATABASE_ID>"

[vars]
WEBHOOK_PATH = "/webhook"
TOPIC_MODE = "false"
USER_VERIFICATION = "true"
WELCOME_TEXT = "你好，欢迎使用私聊中转机器人。"
BLOCKED_TEXT = "你已被管理员限制联系，如有需要请稍后再试。"
