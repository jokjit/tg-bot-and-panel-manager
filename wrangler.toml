name = "telegram-private-chatbot"
main = "worker.js"
compatibility_date = "2026-04-16"
workers_dev = true

# 这是部署配置模板。桌面部署工具会读取并合并本文件，然后通过 Cloudflare API 上传 Worker。
# 文件名保留为 wrangler.toml 是为了兼容 Cloudflare Worker 配置格式，不代表会调用 Wrangler CLI。

# BOT_KV 用于面板密码、用户资料、话题映射、黑白名单和验证状态。
# 部署工具会按当前 Cloudflare Account 自动创建或复用 KV，并把真实 namespace id 写入账号独立配置。
# [[kv_namespaces]]
# binding = "BOT_KV"
# id = "<YOUR_KV_NAMESPACE_ID>"

# DB 用于保存聊天历史、会话索引和后续检索能力。
# 部署工具会按当前 Cloudflare Account 自动创建或复用 D1，并执行 migrations/ 中的 SQL 迁移。
# [[d1_databases]]
# binding = "DB"
# database_name = "tg-bot-history"
# database_id = "<YOUR_D1_DATABASE_ID>"

[vars]
WEBHOOK_PATH = "/webhook"
TOPIC_MODE = "true"
USER_VERIFICATION = "true"
VERIFY_MAX_FAILURES = "2"
WELCOME_TEXT = "你好，欢迎使用私聊中转机器人。"
BLOCKED_TEXT = "你已被管理员限制联系，如有需要请稍后再试。"
DELETED_ACCOUNT_SWEEP_AUTO = "true"
DELETED_ACCOUNT_SWEEP_BATCH_SIZE = "120"
[triggers]
crons = ["0 3 * * 1"]
